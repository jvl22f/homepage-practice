<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <span class="logo">MyPage</span>
    <nav>
      <a href="#about">About</a>
      <a href="#works">Works</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Hello!</h1>
    <p>ようこそ、私のページへ。</p>
  </section>

  <section id="about">
    <h2>About</h2>
    <p>自己紹介をここに書きます。</p>
  </section>

  <section id="works">
    <h2>Works</h2>
    <div class="cards">
      <div class="card red">Project 1</div>
      <div class="card blue">Project 2</div>
      <div class="card green">Project 3</div>
    </div>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>example@example.com</p>
  </section>

  <footer>© 2026 MyPage</footer>

</body>
</html>
