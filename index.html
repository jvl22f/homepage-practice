<!DOCTYPE html>

  <link rel="stylesheet" href="style.css">

<body>

  <header>
    <span class="logo">🇩🇪 Tanaka Tsubasa</span>

      <a href="#skills">Skills</a>
      <a href="#contact">Contact</a>

  <section class="hero">

  <footer>© 2026 田中 羽沙 — Bayern, Deutschland</footer>
